<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>header</title>
    <link rel="stylesheet" href="./styles/general-styles.css">
    <link rel="stylesheet" href="./styles/header-styles.css">
    <link rel="stylesheet" href="./styles/video-styles.css">
</head>
<body>
    <div class="header">
        <div class="left-section">
            <img class="hamburger-menu" src="./images/icons/hamburger-menu.svg" alt="">
            <img class="youtube-logo" src="./images/icons/youtube-logo.svg" alt="">
        </div>

        <!-- ------------------------------------------------------ -->

        <div class="middle-section">
            <input class="search-bar" type="text" placeholder="Search">
            <button class="search-button"><img class="search-icon" src="./images/icons/search.svg" alt=""></button>
            <button class="voice-search-button"><img class="voice-search-icon" src="./images/icons/voice-search-icon.svg" alt=""></button>
        </div>

        <!-- ------------------------------------------------------ -->

        <div class="right-section">
            <img class="upload-icon" src="./images/icons/upload.svg" />
            <img class="youtube-apps-icon" src="./images/icons/youtube-apps.svg" />
            <img
              class="notifications-icon"
              src="./images/icons/notifications.svg"
            />
            <img class="current-user-picture" src="./images/icons/my-channel.jpeg" />
        </div>
    </div>


    <!-- ----------------------------------------------------------------------------------------------- -->
     

  <div class="video-grid">

    <div class="video-card">
      <div class="thumbnail-picture">
        <img class="thumbnail-img" src="./images/thumbnail-1.webp" alt="">
        <div class="video-duration">14:20</div>
      </div>


      <div class="video-info">
        <div class="profile-picture">
          <img class="channel-pic" src="./images/Image20241028091639.jpg" alt="">
        </div>


        <div class="video-details">
          <p class="video-title">Talking Tech and AI with Google CEO Sundar Pichai!</p>
          <p class="author-name">Marques Brownlee</p>
          <p class="video-stats">3.4M views &bull; 6 months ago</p>
        </div>

      </div>
    </div>

    <!-- -------------------------------------------------- -->



    <div class="video-card">
      <div class="thumbnail-picture">
        <img class="thumbnail-img" src="./images/Episode-9.jpg" alt="">
        <div class="video-duration">14:20</div>
      </div>


      <div class="video-info">
        <div class="profile-picture">
          <img class="channel-pic" src="./images/tj.jpg" alt="">
        </div>


        <div class="video-details">
          <p class="video-title">Tom & Jerry</p>
          <p class="author-name">WB Kids</p>
          <p class="video-stats">1.2M views &bull; 15 days ago</p>
        </div>

      </div>
    </div>

    <!-- -------------------------------------------------- -->



    <div class="video-card">
      <div class="thumbnail-picture">
        <img class="thumbnail-img" src="./images/RG-comedy.jpg" alt="">
        <div class="video-duration">14:20</div>
      </div>


      <div class="video-info">
        <div class="profile-picture">
          <img class="channel-pic" src="./images/RG.jpg" alt="">
        </div>


        <div class="video-details">
          <p class="video-title">Standup comedy by Ravi Gupta</p>
          <p class="author-name">Ravi Gupta</p>
          <p class="video-stats">4.7M views &bull; 2 months ago</p>
        </div>

      </div>
    </div>

  </div>

</body>
</html>
