<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

        button
        {
            padding: 10px;
            margin: 5px;
            font-family: Arial, Helvetica, sans-serif;
        }

        .subscribe
        {
            background-color: rgb(200, 0, 0);
            color: white;
            border-radius: 4px;
            border: 2px solid rgb(200, 0, 0);
        }

        .join
        {
            background-color: white;
            color: rgb(2, 158, 252);
            border-radius: 4px;
            border: 2px solid;
        }

        .tweet
        {
            background-color: rgb(2, 158, 252);
            color: white;
            border-radius: 22px;
            border: 2px solid rgb(2, 158, 252);
            padding: 10px 20px;
            font-size: large;
        }

        .subscribe:hover
        {
            background-color: green;
        }

        .subscribe:active
        {
            background-color: blue;
        }

        .subscribe:focus
        {
            background-color: yellow;
        }

        .join:hover
        {
            background-color: rgb(2, 158, 252);
            color: white;
        }

        .tweet:hover
        {
            box-shadow: grey;
            
        }
    </style>

</head>
<body>
    <button class="subscribe">SUBSCRIBE</button>
    <button class="join"> JOIN </button>
    <button class="tweet">Tweet</button>
</body>
</html>
